<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get Involved | Protect Clark Street Park</title>
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<section class="container">
  <h1>Get Involved</h1>

  <h2>Email Your Councillors</h2>
  <p>
    Ask for clarity on pre-application discussions and advocate for
    protecting this community green space.
  </p>

  <h2>Volunteer</h2>
  <p>
    Join planting days this spring. Help with biodiversity efforts,
    planters, and maintenance.
  </p>

  <h2>Contact Us</h2>
  <form name="contact" method="POST" data-netlify="true">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" placeholder="Your Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

</body>
</html>
